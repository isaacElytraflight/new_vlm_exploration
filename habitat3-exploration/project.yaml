id: habitat3-exploration
name: Habitat 3.0 Exploration
description: >-
  Meta Habitat 3.0 (habitat-lab v0.3.x) simulator for VLM-aided room-exploration
  research. Simulation runs in a GPU-enabled Docker container; the real/
  compartment is a stub reserved for a future physical robot.
robotType: explorer

ros:
  distro: jazzy

defaultMission:
  filename: mission_ui.yaml
  yamlText: |
    mission:
      steps: []

sim:
  composeFile: sim/docker/docker-compose.yml
  composeProject: habitat3-exploration
  containerName: habitat3-sim
  novncOrigin: http://localhost:6080
  viewServerPort: 8090
  missionDir: /workspace/missions
  rosInstallSetupPath: /opt/explorer_workspace/ros_workspace/install/setup.bash
  startScriptPath: /workspace/scripts/start_sim.sh
  stopScriptPath: /workspace/scripts/stop_sim.sh
  recordingScriptPath: /workspace/scripts/start_sim.sh
  tmuxSession: habitat
  tmuxCaptureLines: 200
  tmuxStopGraceSeconds: 10
  autoStopOnDisconnect: true

# Stub: no physical robot exists for this project yet. The compartment is
# kept (per the Elytra project-folder contract) so a robot can be wired in
# later without restructuring the package.
real:
  host: ""
  port: 22
  user: ""
  missionDir: ~/missions
  tmuxSession: habitat

buttons:
  - id: start-sim
    label: Run Exploration Episode
    description: Launch a Habitat 3.0 episode inside the sim container (tmux session "habitat")
    kind: script
    scriptKey: start
  - id: stop-sim
    label: Stop Episode
    description: Stop the running Habitat episode
    kind: script
    stopAction: true
  - id: step-forward
    label: Step Forward
    description: Move forward one discrete step (0.25 m). Requires a running episode.
    kind: teleop
    teleopDirection: forward
  - id: turn-left
    label: Rotate Left
    description: Turn left one discrete step (10°). Requires a running episode.
    kind: teleop
    teleopDirection: turn_left
  - id: turn-right
    label: Rotate Right
    description: Turn right one discrete step (10°). Requires a running episode.
    kind: teleop
    teleopDirection: turn_right
  - id: step-backward
    label: Step Backward
    description: Move backward one discrete step (0.25 m). Requires a running episode.
    kind: teleop
    teleopDirection: backward
  - id: smoke-test
    label: GPU Smoke Test
    description: Load a test scene, step a random agent, report renderer + FPS
    kind: script
    scriptPath: /workspace/scripts/run_smoke_test.sh
  - id: movement-demo
    label: Movement Demo
    description: >-
      Send a fixed ROS action sequence (forward 1, turn left 90°, forward 2,
      turn right 90°, back 2). Requires a running exploration episode.
    kind: script
    scriptPath: /workspace/scripts/run_movement_demo.sh
    oneshot: true
  - id: dfs-highest
    label: DFS Highest First
    description: >-
      Select next DFS child by highest VLM openness score (default policy).
      Applies live to the running explore node.
    kind: script
    scriptPath: /workspace/scripts/set_dfs_order.sh
    extraArgs: highest
    oneshot: true
  - id: dfs-lowest
    label: DFS Lowest First
    description: >-
      Select next DFS child by lowest VLM openness score.
      Applies live to the running explore node.
    kind: script
    scriptPath: /workspace/scripts/set_dfs_order.sh
    extraArgs: lowest
    oneshot: true

views:
  - id: third-person
    label: Third Person
    type: ros-image
    topic: /birdseye_data
    primary: true
  - id: rgb
    label: RGB Camera
    type: ros-image
    topic: /image_data
  - id: depth-debug
    label: Depth Debug
    type: ros-image
    topic: /depth_data
  - id: grid-map
    label: Grid Map
    type: ros-compressed
    topic: /map_renderer/grid_img
  - id: nav-plan-map
    label: Nav Plan (Bird's Eye)
    type: ros-compressed
    topic: /map_renderer/nav_plan_img
  - id: current-frontier
    label: Current Frontier (VLM)
    type: ros-compressed
    topic: /exploration/debug/current_frontier_img
